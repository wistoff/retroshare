[global]
    workgroup = WORKGROUP
    server string = retroshare

    # Guest / auth
    map to guest = bad user
    guest account = nobody

    # Protocol: allow SMB2 and SMB3, skip SMB1
    server min protocol = SMB2

    # Allow symlinks to point outside share paths
    allow insecure wide links = yes

    # Suppress noise
    log level = 1
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes

[roms]
    path = /merged
    browseable = yes
    read only = yes
    guest ok = yes

    # Follow symlinks out of the share root
    follow symlinks = yes
    wide links = yes

[saves]
    # Writable guest share for save data pushed from R36S devices.
    # Points at the raw local source so saves land next to their ROM
    # (/sources/local/<system>/<rom>.srm), matching the R36S layout where
    # saves sit next to the ROM in /roms2/<system>/. Friend-sources are
    # physically unreachable from here — they are separate bind mounts.
    path = /sources/local
    browseable = yes
    read only = no
    writable = yes
    guest ok = yes
    force user = root
    create mask = 0664
    directory mask = 0775
