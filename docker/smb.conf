[global]
    workgroup = WORKGROUP
    server string = retroshare

    # Guest / auth
    map to guest = bad user
    guest account = nobody

    # Protocol: allow SMB2 and SMB3, skip SMB1
    server min protocol = SMB2

    # Allow symlinks to point outside share paths
    allow insecure wide links = yes

    # Suppress noise
    log level = 1
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes

[roms]
    path = /merged
    browseable = yes
    read only = yes
    guest ok = yes

    # Follow symlinks out of the share root
    follow symlinks = yes
    wide links = yes

[saves]
    # Writable guest share for save data pushed from R36S devices.
    # Lives inside /sources/local so promoted ROMs and their saves end up
    # on the same physical store; friend-sources are physically unreachable
    # from here because there is no symlink out of this path.
    path = /sources/local/.saves
    browseable = yes
    read only = no
    writable = yes
    guest ok = yes
    force user = root
    create mask = 0664
    directory mask = 0775
